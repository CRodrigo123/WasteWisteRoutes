# ============================================================
# Waste Wise Routes - Configuración de la Aplicación
# ============================================================

# Servidor
server.port=${PORT:8080}

# Base de datos MySQL
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/wastewiseroutes?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:SQLUpc$2024%%}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Nombre de la aplicación
spring.application.name=WasteWiseRoutes

# Google Maps API Key
google.maps.api.key=${GOOGLE_MAPS_API_KEY:AIzaSyDY5uzwKUvhhx0G1VYe3FuMY9Nsf0s6Swg}

# Context path
server.servlet.context-path=/grupo3/WasteWiseRoutes

# Seguridad JWT
app.jwt.secret=${JWT_SECRET:CAMBIA_ESTE_SECRETO_EN_PRODUCCION_12345678901234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
